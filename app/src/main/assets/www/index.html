<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aupi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1b2d; --surface: #162032; --accent: #5ec4ff;
      --accent2: #ffb347; --text: #e8f4ff; --text-soft: #8aaec8; --radius: 20px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; user-select: none; }
    header { width: 100%; max-width: 480px; display: flex; align-items: center; justify-content: space-between; padding: 8px 0 16px; }
    header h1 { font-size: 1.8rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
    #status-dot { width: 12px; height: 12px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 8px #4caf50; }
    #character-area { width: 200px; height: 200px; margin: 8px auto 16px; position: relative; cursor: pointer; }
    #character-svg { width: 100%; height: 100%; transition: transform 0.2s; }
    #character-area:active #character-svg { transform: scale(0.93); }
    #speech-bubble { background: var(--surface); border: 1.5px solid var(--accent); border-radius: var(--radius); padding: 14px 18px; max-width: 480px; width: 100%; min-height: 60px; text-align: center; font-size: 1.05rem; line-height: 1.5; color: var(--text); margin-bottom: 16px; }
    #emotion-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .emo-btn { background: var(--surface); border: 1.5px solid var(--accent); border-radius: 50px; padding: 8px 18px; color: var(--accent); font-size: 0.95rem; cursor: pointer; }
    .emo-btn:active { background: var(--accent); color: var(--bg); }
    #modules { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 480px; margin-bottom: 20px; }
    .module-btn { background: var(--surface); border: 1.5px solid #2a4060; border-radius: var(--radius); padding: 18px 10px; text-align: center; cursor: pointer; }
    .module-btn:active { border-color: var(--accent); }
    .module-btn .icon { font-size: 2rem; display: block; margin-bottom: 6px; }
    .module-btn .label { font-size: 0.85rem; color: var(--text-soft); }
    #active-panel { width: 100%; max-width: 480px; background: var(--surface); border: 1.5px solid var(--accent); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: none; }
    #active-panel.open { display: block; }
    #active-panel h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 14px; }
    #color-game { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #color-target { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #2a4060; }
    #color-options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .color-opt { width: 60px; height: 60px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
    .color-opt:active { transform: scale(0.88); }
    #word-game { text-align: center; }
    #word-image { font-size: 4rem; margin-bottom: 10px; }
    #word-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .word-opt { background: #1e3050; border: 1.5px solid #2a4060; border-radius: 12px; padding: 10px; font-size: 1rem; color: var(--text); cursor: pointer; }
    .word-opt:active { border-color: var(--accent); }
    #breath-area { text-align: center; }
    #breath-circle { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, var(--accent) 0%, #0f1b2d 70%); margin: 0 auto 14px; transition: transform 4s ease-in-out; }
    #breath-text { font-size: 1.2rem; color: var(--text-soft); }
    #mic-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 50px; padding: 14px 36px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; max-width: 480px; margin-bottom: 10px; }
    #mic-btn.listening { background: #ff5252; }
    #feedback { font-size: 1.4rem; text-align: center; min-height: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>AUPI</h1>
    <div id="status-dot"></div>
  </header>
  <div id="character-area" onclick="greet()">
    <svg id="character-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="115" r="55" fill="#1e3a5f" />
      <circle cx="100" cy="72" r="42" fill="#2a5298" />
      <ellipse id="eye-left" cx="84" cy="68" rx="8" ry="9" fill="white" />
      <ellipse id="eye-right" cx="116" cy="68" rx="8" ry="9" fill="white" />
      <circle id="pupil-left" cx="86" cy="70" r="4.5" fill="#0a1628" />
      <circle id="pupil-right" cx="118" cy="70" r="4.5" fill="#0a1628" />
      <circle cx="88" cy="67" r="1.8" fill="white" />
      <circle cx="120" cy="67" r="1.8" fill="white" />
      <path id="mouth" d="M 86 86 Q 100 96 114 86" stroke="#5ec4ff" stroke-width="3" fill="none" stroke-linecap="round" />
      <circle cx="60" cy="42" r="7" fill="#5ec4ff" opacity="0.7" />
      <circle cx="140" cy="42" r="7" fill="#5ec4ff" opacity="0.7" />
      <line x1="68" y1="44" x2="75" y2="52" stroke="#5ec4ff" stroke-width="2.5" />
      <line x1="132" y1="44" x2="125" y2="52" stroke="#5ec4ff" stroke-width="2.5" />
      <text x="88" y="125" font-size="18" fill="#ffb347">♥</text>
    </svg>
  </div>
  <div id="speech-bubble">¡Hola! Soy Aupi. ¡Tócame para saludar! 👋</div>
  <div id="emotion-bar">
    <button class="emo-btn" onclick="setEmotion('feliz')">😊 Feliz</button>
    <button class="emo-btn" onclick="setEmotion('triste')">😢 Triste</button>
    <button class="emo-btn" onclick="setEmotion('sorprendido')">😮 Sorpresa</button>
    <button class="emo-btn" onclick="setEmotion('calma')">😌 Calma</button>
  </div>
  <div id="modules">
    <div class="module-btn" onclick="openModule('colores')"><span class="icon">🎨</span><span class="label">Colores</span></div>
    <div class="module-btn" onclick="openModule('palabras')"><span class="icon">🔤</span><span class="label">Palabras</span></div>
    <div class="module-btn" onclick="openModule('respiracion')"><span class="icon">🌬️</span><span class="label">Respira</span></div>
    <div class="module-btn" onclick="openModule('canciones')"><span class="icon">🎵</span><span class="label">Canciones</span></div>
  </div>
  <div id="active-panel"><h2 id="panel-title"></h2><div id="panel-content"></div></div>
  <div id="feedback"></div>
  <button id="mic-btn" onclick="toggleVoice()">🎤 Hablar con Aupi</button>
  <script>
    var speechSynth=window.speechSynthesis||null;
    var recognition=null,isListening=false,currentEmotion='feliz';
    function speak(t){try{if(!speechSynth)return;speechSynth.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=0.9;u.pitch=1.2;speechSynth.speak(u);}catch(e){}}
    function setBubble(t){document.getElementById('speech-bubble').textContent=t;}
    function setFeedback(t){document.getElementById('feedback').textContent=t;setTimeout(function(){document.getElementById('feedback').textContent='';},2500);}
    var expressions={feliz:{mouth:"M 86 86 Q 100 96 114 86",eyeRy:9,pupilY:2},triste:{mouth:"M 86 92 Q 100 84 114 92",eyeRy:7,pupilY:4},sorprendido:{mouth:"M 90 88 Q 100 100 110 88",eyeRy:12,pupilY:2},calma:{mouth:"M 88 87 Q 100 90 112 87",eyeRy:6,pupilY:3}};
    function setEmotion(n){currentEmotion=n;var e=expressions[n]||expressions.feliz;document.getElementById('mouth').setAttribute('d',e.mouth);['eye-left','eye-right'].forEach(function(id){document.getElementById(id).setAttribute('ry',e.eyeRy);});document.getElementById('pupil-left').setAttribute('cy',68+e.pupilY);document.getElementById('pupil-right').setAttribute('cy',68+e.pupilY);var msgs={feliz:['¡Estoy muy feliz de verte! 😊','¡Qué día tan bonito! 🌟'],triste:['A veces me pongo triste... pero estás aquí. 💙','¿Me das un abrazo? 🤗'],sorprendido:['¡Guau! ¡Eso me sorprende! 😮','¡Oh! ¡No me lo esperaba!'],calma:['Respira conmigo. Todo está bien. 😌','Estamos tranquilos. 🌿']};var list=msgs[n]||msgs.feliz;var msg=list[Math.floor(Math.random()*list.length)];setBubble(msg);speak(msg);}
    var greetings=['¡Hola! Me alegra que estés aquí. 👋','¡Qué bueno verte! ¿Cómo estás? 😊','¡Hola hola! ¿Jugamos juntos? 🎮','¡Aquí estoy! ¡Somos amigos! 💙'];
    var greetIdx=0;
    function greet(){var msg=greetings[greetIdx%greetings.length];greetIdx++;setBubble(msg);speak(msg);setEmotion('feliz');}
    var colorData=[{name:'Rojo',hex:'#e53935'},{name:'Azul',hex:'#1e88e5'},{name:'Verde',hex:'#43a047'},{name:'Amarillo',hex:'#fdd835'},{name:'Naranja',hex:'#fb8c00'},{name:'Morado',hex:'#8e24aa'}];
    var wordData=[{emoji:'🐱',word:'Gato',opts:['Gato','Perro','Pato']},{emoji:'🐶',word:'Perro',opts:['Gato','Perro','Casa']},{emoji:'🌞',word:'Sol',opts:['Luna','Nube','Sol']},{emoji:'🍎',word:'Manzana',opts:['Manzana','Pera','Uva']},{emoji:'🚗',word:'Coche',opts:['Tren','Coche','Barco']}];
    var colorTarget=null,wordTarget=null,breathInterval=null;
    function openModule(name){var panel=document.getElementById('active-panel');var title=document.getElementById('panel-title');var content=document.getElementById('panel-content');panel.className='open';if(breathInterval){clearTimeout(breathInterval);breathInterval=null;}
    if(name==='colores'){title.textContent='🎨 ¿De qué color es?';colorTarget=colorData[Math.floor(Math.random()*colorData.length)];var sh=colorData.slice().sort(function(){return Math.random()-.5;}).slice(0,4);if(!sh.find(function(c){return c.name===colorTarget.name;})){sh[0]=colorTarget;sh=sh.sort(function(){return Math.random()-.5;});}var html='<div id="color-game"><div id="color-target" style="background:'+colorTarget.hex+'"></div><p style="color:var(--text-soft);font-size:0.9rem">¿Qué color es este?</p><div id="color-options">';sh.forEach(function(c){html+='<div class="color-opt" style="background:'+c.hex+'" onclick="checkColor(\''+c.name+'\')"></div>';});html+='</div></div>';content.innerHTML=html;speak('¿De qué color es este?');setBubble('¡Toca el color correcto! 🎨');}
    else if(name==='palabras'){title.textContent='🔤 ¿Qué palabra es?';wordTarget=wordData[Math.floor(Math.random()*wordData.length)];var opts=wordTarget.opts.slice().sort(function(){return Math.random()-.5;});var html='<div id="word-game"><div id="word-image">'+wordTarget.emoji+'</div><p style="color:var(--text-soft);font-size:0.9rem">¿Cuál describe la imagen?</p><div id="word-options">';opts.forEach(function(o){html+='<div class="word-opt" onclick="checkWord(\''+o+'\')">'+o+'</div>';});html+='</div></div>';content.innerHTML=html;speak('¿Qué palabra describe la imagen?');setBubble('¡Elige la palabra correcta! 🔤');}
    else if(name==='respiracion'){title.textContent='🌬️ Respiración';content.innerHTML='<div id="breath-area"><div id="breath-circle"></div><p id="breath-text">Prepárate...</p></div>';speak('Vamos a respirar juntos.');setBubble('Respira conmigo. 😌');setEmotion('calma');startBreath();}
    else if(name==='canciones'){title.textContent='🎵 Canciones';var songs=[{name:'Cabeza, hombros, rodillas',action:'Toca tu cabeza, luego hombros, luego rodillas 🎶'},{name:'Los colores del arcoíris',action:'Di un color del arcoíris 🌈'},{name:'Los animales de la granja',action:'Haz el sonido de un animal 🐄'}];var html='<div style="display:flex;flex-direction:column;gap:10px">';songs.forEach(function(s){html+='<div class="word-opt" onclick="playSong(\''+s.action+'\')">'+s.name+'</div>';});html+='</div>';content.innerHTML=html;speak('¿Qué canción quieres?');setBubble('¡Elige una canción! 🎵');}}
    function checkColor(n){if(n===colorTarget.name){setFeedback('¡Muy bien! 🌟');setBubble('¡Correcto! Es el color '+n+'. ¡Eres muy listo! 🎉');speak('¡Correcto! Es el color '+n);setEmotion('feliz');}else{setFeedback('¡Inténtalo de nuevo! 💪');speak('Vuelve a intentarlo');}}
    function checkWord(w){if(w===wordTarget.word){setFeedback('¡Perfecto! 🌟');setBubble('¡Sí! Es: '+w+'. ¡Genial! 🎉');speak('¡Correcto! Es '+w);setEmotion('feliz');}else{setFeedback('¡Casi! Prueba otra vez 💪');speak('Casi, inténtalo de nuevo');}}
    function playSong(a){setBubble(a);speak(a);setEmotion('feliz');}
    function startBreath(){var circle=document.getElementById('breath-circle');var text=document.getElementById('breath-text');if(!circle)return;var phase=0;var phases=[{label:'Inhala... 🌬️',scale:'scale(1.5)',dur:4000},{label:'Mantén... ✨',scale:'scale(1.5)',dur:2000},{label:'Exhala... 😌',scale:'scale(1.0)',dur:4000},{label:'Descansa...',scale:'scale(1.0)',dur:2000}];function run(){var c=document.getElementById('breath-circle');var t=document.getElementById('breath-text');if(!c)return;var p=phases[phase%phases.length];if(t)t.textContent=p.label;c.style.transform=p.scale;phase++;breathInterval=setTimeout(run,p.dur);}run();}
    function toggleVoice(){var btn=document.getElementById('mic-btn');var SR=window.SpeechRecognition||window.webkitSpeechRecognition||null;if(!SR){setBubble('Reconocimiento de voz no disponible. 😔');return;}if(isListening){try{recognition.stop();}catch(e){}isListening=false;btn.textContent='🎤 Hablar con Aupi';btn.classList.remove('listening');return;}try{recognition=new SR();recognition.lang='es-ES';recognition.interimResults=false;recognition.onstart=function(){isListening=true;btn.textContent='🔴 Escuchando...';btn.classList.add('listening');setBubble('Te escucho... 👂');};recognition.onresult=function(e){processVoice(e.results[0][0].transcript.toLowerCase());};recognition.onerror=function(){isListening=false;btn.textContent='🎤 Hablar con Aupi';btn.classList.remove('listening');setBubble('No te escuché. ¡Inténtalo de nuevo! 🎤');};recognition.onend=function(){isListening=false;btn.textContent='🎤 Hablar con Aupi';btn.classList.remove('listening');};recognition.start();}catch(e){setBubble('No pude iniciar el micrófono. 😔');}}
    function processVoice(t){if(t.indexOf('hola')>=0||t.indexOf('aupi')>=0){var r='¡Hola! ¡Me alegra escucharte! 😊';setBubble(r);speak(r);setEmotion('feliz');}else if(t.indexOf('feliz')>=0||t.indexOf('bien')>=0){var r='¡Qué bueno! Yo también estoy feliz. 🌟';setBubble(r);speak(r);setEmotion('feliz');}else if(t.indexOf('triste')>=0||t.indexOf('mal')>=0){var r='Estoy contigo. No estás solo. 💙';setBubble(r);speak(r);setEmotion('triste');}else if(t.indexOf('jugar')>=0){var r='¡Vamos a jugar! Elige un módulo. 🎮';setBubble(r);speak(r);setEmotion('feliz');}else if(t.indexOf('respirar')>=0||t.indexOf('calma')>=0){openModule('respiracion');}else if(t.indexOf('color')>=0){openModule('colores');}else if(t.indexOf('palabra')>=0){openModule('palabras');}else if(t.indexOf('canción')>=0||t.indexOf('cantar')>=0){openModule('canciones');}else{var r='¡Cuéntame más! Siempre te escucho. 😊';setBubble(r);speak(r);}}
    window.onload=function(){setBubble('¡Hola! Soy Aupi. ¡Tócame para saludar! 👋');};
  </script>
</body>
</html>
